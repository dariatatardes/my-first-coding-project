<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="cards-container">
        <div class="card">
            <h1 class="card-title">Hobby</h1>
            <p class="card-price">Free</p>
            <div class="card-content">
                <p class="includes-text">Includes:</p>
                <ul class="features-list">
                    <li>
                        <span class="checkmark">✓</span>
                        No credit card required
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Limited Agent requests
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Limited Tab completions
                    </li>
                </ul>
            </div>
            <button class="download-button">Download</button>
        </div>
        <div class="card">
            <h1 class="card-title">Ultra</h1>
            <p class="card-price">$200</p>
            <div class="card-content">
                <p class="includes-text">Everything in Pro, plus:</p>
                <ul class="features-list">
                    <li>
                        <span class="checkmark">✓</span>
                        Priority 24/7 support
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Dedicated onboarding & training
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Custom integrations & workflows
                    </li>
                </ul>
            </div>
            <button class="download-button">Go Ultra</button>
        </div>
    </div>
</body>
</html>
